apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: tenant-TENANT_ID
  labels:
    app: entra-portal-agent
    entra-portal/tenant-id: TENANT_ID
spec:
  replicas: 1
  selector:
    matchLabels:
      app: entra-portal-agent
  template:
    metadata:
      labels:
        app: entra-portal-agent
        entra-portal/tenant-id: TENANT_ID
    spec:
      serviceAccountName: tenant-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        readOnlyRootFilesystem: true
      containers:
        - name: agent
          image: entra-portal/agent:latest
          env:
            - name: TENANT_ID
              value: TENANT_ID
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PANEL_WS_URL
              value: "ws://api.entra-portal-system.svc.cluster.local:3002"
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SYNC_INTERVAL_MINUTES
              value: "15"
            - name: LOG_LEVEL
              value: "info"
          envFrom:
            - secretRef:
                name: graph-credentials
            - secretRef:
                name: agent-auth
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-agent
  namespace: tenant-TENANT_ID
  labels:
    entra-portal/tenant-id: TENANT_ID
