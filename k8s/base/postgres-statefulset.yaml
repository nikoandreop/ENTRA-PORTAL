apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: entra-portal-system
  labels:
    app: entra-portal-postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: entra-portal-postgres
  template:
    metadata:
      labels:
        app: entra-portal-postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: tcp
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: entra_portal
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "entra", "-d", "entra_portal"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "entra", "-d", "entra_portal"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: entra-portal-system
spec:
  selector:
    app: entra-portal-postgres
  ports:
    - name: tcp
      port: 5432
      targetPort: tcp
  clusterIP: None
