apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: entra-portal-system
  labels:
    app: entra-portal-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: entra-portal-frontend
  template:
    metadata:
      labels:
        app: entra-portal-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      containers:
        - name: frontend
          image: entra-portal/frontend:latest
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
