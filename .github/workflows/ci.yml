name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: entra_portal_test
          POSTGRES_USER: entra_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: entra_portal_test
      DB_USER: entra_test
      DB_PASSWORD: test_password
      JWT_SECRET: test-jwt-secret-for-ci-only-do-not-use-in-prod
      AGENT_JWT_SECRET: test-agent-secret-for-ci
      ENCRYPTION_KEY: test-encryption-key-32-chars!!!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm -w src/api run test

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm -w frontend run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-api, test-frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: entra_portal_e2e
          POSTGRES_USER: entra_e2e
          POSTGRES_PASSWORD: e2e_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: entra_portal_e2e
      DB_USER: entra_e2e
      DB_PASSWORD: e2e_password
      JWT_SECRET: e2e-jwt-secret-for-ci
      AGENT_JWT_SECRET: e2e-agent-secret
      ENCRYPTION_KEY: e2e-encryption-key-32-chars!!!!!
      DEFAULT_ADMIN_PASSWORD: E2eTestPass!2024
      CORS_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm -w src/api run build
      - run: npm -w frontend run build
      - name: Start API server
        run: node src/api/dist/server.js &
        env:
          NODE_ENV: test
      - name: Start frontend preview
        run: npx -w frontend vite preview --port 5173 &
      - name: Wait for services
        run: npx wait-on http://localhost:3001/api/health http://localhost:5173 --timeout 30000
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: entra-portal/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.agent
          push: false
          tags: entra-portal/agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          tags: entra-portal/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
